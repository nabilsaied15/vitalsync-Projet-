# Pipeline CI/CD pour VitalSync
# Pourquoi avoir choisi GitHub Actions ?
# Facilité d'intégration native avec le dépôt Git et riche écosystème d'actions pré-configurées.
name: VitalSync Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Étape 1 - Lint & Tests (Node.js)
  lint-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Run Linter (ESLint)
        working-directory: ./backend
        run: npx eslint .
      - name: Run Tests (Jest)
        working-directory: ./backend
        run: npm test

  # Étape 2 - Construction & Push Docker Hub (Registry)
  # Pourquoi utiliser le commit SHA comme tag ?
  # Cela garantit l'immuabilité et la traçabilité. On sait exactement quel commit correspond à quelle image en production.
  build-and-push:
    needs: lint-and-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vitalsync-api:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/vitalsync-api:latest
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vitalsync-front:${{ github.sha }}, ${{ secrets.DOCKER_USERNAME }}/vitalsync-front:latest

  # Étape 3 - Déploiement Staging (Simulé)
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Simulation Déploiement (docker-compose)
        run: |
          docker-compose up -d
          # Health check : Vérification de la santé du backend après déploiement
          # Pourquoi un health check ? Pour garantir que l'application démarre et répond correctement avant de la considérer comme déployée.
          echo "Vérification de la santé..."
          MAX_RETRIES=5
          COUNT=0
          until $(curl --output /dev/null --silent --head --fail http://localhost:3000/health); do
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Health check échoué ! Pipeline stop."
              exit 1
            fi
            echo "Tentative de reconnexion ($COUNT)..."
            sleep 5
            COUNT=$((COUNT+1))
          done
          echo "Service Healthy ! Déploiement validé."
